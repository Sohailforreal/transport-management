<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1d4ed8"/>
  
  <!-- Truck body -->
  <rect x="8" y="35" width="52" height="30" rx="4" fill="white"/>
  
  <!-- Cabin -->
  <rect x="60" y="42" width="28" height="23" rx="4" fill="white" opacity="0.9"/>
  
  <!-- Cabin window -->
  <rect x="64" y="45" width="14" height="10" rx="2" fill="#93c5fd"/>
  
  <!-- Front light -->
  <rect x="86" y="52" width="4" height="5" rx="1" fill="#fbbf24"/>
  
  <!-- Wheel 1 -->
  <circle cx="22" cy="68" r="8" fill="#1e40af"/>
  <circle cx="22" cy="68" r="3" fill="#93c5fd"/>
  
  <!-- Wheel 2 -->
  <circle cx="46" cy="68" r="8" fill="#1e40af"/>
  <circle cx="46" cy="68" r="3" fill="#93c5fd"/>
  
  <!-- Wheel 3 -->
  <circle cx="72" cy="68" r="8" fill="#1e40af"/>
  <circle cx="72" cy="68" r="3" fill="#93c5fd"/>
</svg>